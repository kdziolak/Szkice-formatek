# Project-scoped Codex configuration for the Road GIS Platform.
# Codex loads .codex/config.toml only for trusted projects. This repo is trusted locally.
#
# VERIFY_WITH_CURRENT_CODEX_VERSION:
# - Current Codex docs say custom providers use the Responses API protocol.
# - If Qwen Colab exposes only /v1/chat/completions, use tools/proxy locally.
# - Codex config may not expand ${ENV_VAR} in base_url/model values. The proxy profile is
#   the conservative runnable path; use `codex -c ...` overrides if needed.

profile = "main-review"
model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "concise"
model_verbosity = "low"
model_context_window = 128000
model_auto_compact_token_limit = 96000
sandbox_mode = "workspace-write"
approval_policy = "on-request"
project_doc_max_bytes = 60000

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[model_providers.qwen_colab_proxy]
name = "Small Qwen Coder Colab via local Responses proxy"
base_url = "http://127.0.0.1:8765/v1"
env_key = "PROXY_API_KEY"
env_key_instructions = "Set PROXY_API_KEY to the same value expected by tools/proxy/responses_to_chat_proxy.py."
wire_api = "responses"
request_max_retries = 2
stream_max_retries = 2
stream_idle_timeout_ms = 180000
supports_websockets = false

[model_providers.qwen_colab_direct]
name = "Small Qwen Coder Colab direct endpoint"
base_url = "${QWEN_COLAB_BASE_URL}/v1"
env_key = "QWEN_COLAB_API_KEY"
env_key_instructions = "VERIFY_WITH_CURRENT_CODEX_VERSION: base_url env interpolation may not be supported. Prefer qwen_colab_proxy unless direct Responses API works."
wire_api = "responses"
request_max_retries = 2
stream_max_retries = 2
stream_idle_timeout_ms = 180000
supports_websockets = false

[mcp_servers.proxima]
enabled = true
required = false
command = "${PROXIMA_PATH}"
args = []
env_vars = ["GEMINI_API_KEY", "GOOGLE_API_KEY", "PROXIMA_CONFIG", "PROXIMA_PROFILE"]
startup_timeout_sec = 20
tool_timeout_sec = 90
# VERIFY_WITH_CURRENT_CODEX_VERSION / PROXIMA_VERSION:
# If Proxima expects a wrapper command, replace command/args with the real launcher.

[profiles.main-review]
model = "gpt-5.4"
model_provider = "openai"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "low"
model_context_window = 128000
model_auto_compact_token_limit = 96000
sandbox_mode = "workspace-write"
approval_policy = "on-request"
web_search = "cached"

[profiles.qwen-colab-worker]
model = "Qwen/Qwen2.5-Coder-1.5B-Instruct"
model_provider = "qwen_colab_proxy"
model_context_window = 32768
model_auto_compact_token_limit = 24000
model_verbosity = "low"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
web_search = "disabled"

[profiles.qwen-colab-readonly]
model = "Qwen/Qwen2.5-Coder-1.5B-Instruct"
model_provider = "qwen_colab_proxy"
model_context_window = 32768
model_auto_compact_token_limit = 24000
model_verbosity = "low"
sandbox_mode = "read-only"
approval_policy = "on-request"
web_search = "disabled"

[profiles.gemini-consultant]
model = "gpt-5.4-mini"
model_provider = "openai"
model_reasoning_effort = "medium"
model_verbosity = "low"
sandbox_mode = "read-only"
approval_policy = "on-request"
web_search = "disabled"

[profiles.final-reviewer]
model = "gpt-5.4"
model_provider = "openai"
model_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "low"
model_context_window = 128000
model_auto_compact_token_limit = 96000
sandbox_mode = "read-only"
approval_policy = "on-request"
web_search = "cached"
