# Project-scoped Codex configuration for the Road GIS Platform.
# Codex loads .codex/config.toml only for trusted projects. This repo is trusted locally.
#
# VERIFY_WITH_CURRENT_CODEX_VERSION:
# - Current Codex docs say custom providers use the Responses API protocol.
# - Qwen agents use the Kaggle ngrok OpenAI-compatible endpoint.
# - If Kaggle exposes only /v1/chat/completions, use tools/proxy locally.
# - Codex config may not expand ${ENV_VAR} in base_url/model values. The proxy profile is
#   the conservative runnable path; use `codex -c ...` overrides if direct env URLs are needed.

profile = "main-review"
model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "low"
model_context_window = 128000
model_auto_compact_token_limit = 96000
sandbox_mode = "workspace-write"
approval_policy = "on-request"
project_doc_max_bytes = 60000

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[model_providers.qwen_kaggle_proxy]
name = "Qwen 3.5 9B Kaggle ngrok via local Responses proxy"
base_url = "http://127.0.0.1:8765/v1"
env_key = "PROXY_API_KEY"
env_key_instructions = "Set PROXY_API_KEY to the same value expected by tools/proxy/responses_to_chat_proxy.py."
wire_api = "responses"
request_max_retries = 2
stream_max_retries = 2
stream_idle_timeout_ms = 180000
supports_websockets = false

[model_providers.qwen_kaggle_direct]
name = "Qwen 3.5 9B Kaggle ngrok direct endpoint"
base_url = "${QWEN_KAGGLE_BASE_URL}"
env_key = "QWEN_KAGGLE_API_KEY"
env_key_instructions = "Set QWEN_KAGGLE_BASE_URL to the current ngrok URL and QWEN_KAGGLE_API_KEY to the key expected by the Kaggle server. VERIFY_WITH_CURRENT_CODEX_VERSION: base_url env interpolation may not be supported; prefer qwen_kaggle_proxy when in doubt."
wire_api = "responses"
request_max_retries = 2
stream_max_retries = 2
stream_idle_timeout_ms = 180000
supports_websockets = false

[mcp_servers.proxima]
enabled = true
required = false
command = "${PROXIMA_PATH}"
args = []
env_vars = ["GEMINI_API_KEY", "GOOGLE_API_KEY", "PROXIMA_CONFIG", "PROXIMA_PROFILE"]
startup_timeout_sec = 20
tool_timeout_sec = 90
# VERIFY_WITH_CURRENT_CODEX_VERSION / PROXIMA_VERSION:
# If Proxima expects a wrapper command, replace command/args with the real launcher.

[profiles.main-review]
model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "low"
model_context_window = 128000
model_auto_compact_token_limit = 96000
sandbox_mode = "workspace-write"
approval_policy = "on-request"
web_search = "cached"

[profiles.qwen-colab-worker]
model = "Qwen/Qwen3.5-9B"
model_provider = "qwen_kaggle_proxy"
model_context_window = 16384
model_auto_compact_token_limit = 12000
model_verbosity = "low"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
web_search = "disabled"

[profiles.qwen-kaggle-worker]
model = "Qwen/Qwen3.5-9B"
